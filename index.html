<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideX - Code Editor</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app">
      <!-- Activity Bar (left sidebar) -->
      <div id="activitybar">
        <div class="activity-item active" data-view="explorer" title="Explorer">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/>
          </svg>
        </div>
        <div class="activity-item" data-view="search" title="Search">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </div>
        <div class="activity-item" data-view="git" title="Source Control">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/>
          </svg>
        </div>
        <div class="activity-item" data-view="extensions" title="Extensions">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z"/>
          </svg>
        </div>
      </div>

      <!-- Sidebar -->
      <div id="sidebar">
        <div id="sidebar-header">
          <h3>EXPLORER</h3>
        </div>
        <div id="sidebar-content">
          <div class="tree-view">
            <div class="tree-item folder" data-path="/">
              <span class="tree-icon">📁</span>
              <span class="tree-label">Open Folder</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Content Area -->
      <div id="main-content">
        <!-- Tabs -->
        <div id="tabs">
          <div class="tab-bar"></div>
        </div>

        <!-- Editor Container -->
        <div id="editor-container"></div>

        <!-- Welcome Screen -->
        <div id="welcome-screen">
          <div class="welcome-content">
            <h1>SideX</h1>
            <p class="tagline">Code editor built with Tauri + Monaco</p>
            
            <div class="start-actions">
              <button class="primary-button" id="open-file-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6 2c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6H6zm7 7V3.5L18.5 9H13z"/>
                </svg>
                Open File
              </button>
              <button class="secondary-button" id="open-folder-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/>
                </svg>
                Open Folder
              </button>
            </div>

            <div class="recent-files">
              <h3>Recent</h3>
              <div class="recent-list">
                <p class="no-recent">No recent files</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Status Bar -->
        <div id="statusbar">
          <div class="statusbar-left">
            <span class="statusbar-item" id="line-col">Ln 1, Col 1</span>
            <span class="statusbar-item" id="language">Plain Text</span>
          </div>
          <div class="statusbar-right">
            <span class="statusbar-item" id="encoding">UTF-8</span>
            <span class="statusbar-item" id="eol">LF</span>
          </div>
        </div>
      </div>

      <!-- Command Palette -->
      <div id="command-palette" class="hidden">
        <div class="command-palette-backdrop"></div>
        <div class="command-palette-dialog">
          <input type="text" id="command-input" placeholder="Type a command...">
          <div id="command-results"></div>
        </div>
      </div>
    </div>
  </body>
</html>
